<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Pi Tablet Yönetim</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header><div><strong>Pi Tablet</strong><span>Yönetim paneli</span></div><div class="connection"><label>Pi adresi<input id="pi-address" value="http://192.168.1.22:8090"></label><button id="connect">Bağlan</button><button id="save">Kaydet ve uygula</button></div></header>
  <main>
    <section class="editor">
      <div class="section-title"><h1>Ana menü</h1><div class="system-add"><select id="built-in-select"><option value="phone">Telefon</option><option value="youtube-kids">YouTube Kids</option><option value="gcompris">GCompris</option><option value="tuxpaint">Tux Paint</option><option value="settings">Ses ayarları</option></select><button id="add-built-in">Kiosk bölümünü ekle</button></div></div>
      <label>Tablet başlığı<input id="title" maxlength="32"></label>
      <label>Arka plan rengi<input id="background" type="color"></label>
      <section class="installed-apps">
        <div>
          <strong>Pi'de kurulu uygulamadan ekle</strong>
          <span>Yeni bir uygulama Pi'ye kurulduğunda listeyi yenile.</span>
        </div>
        <select id="installed-app-select"><option value="">Uygulamalar yükleniyor...</option></select>
        <button id="refresh-apps" title="Kurulu uygulama listesini yenile">Yenile</button>
        <button id="add-installed">Menüye ekle</button>
      </section>
      <div id="apps"></div>
    </section>
    <aside>
      <div class="preview-head"><span>Canlı temsili görünüm</span><span id="state">Bağlanıyor</span></div>
      <a class="live-link" href="https://connect.raspberrypi.com/devices/f560bc11-b7d1-4ecb-ad83-99beda102db7/screen-sharing-session" target="_blank" rel="noreferrer">Gerçek tablet ekranını aç</a>
      <div class="tablet"><div class="tablet-screen"><div class="tablet-title" id="preview-title"></div><div class="tiles" id="preview-apps"></div><nav>◁ <b>○</b> □</nav></div></div>
      <p>Değişiklikler yazarken önizlenir. Kaydettiğinde tablet birkaç saniye içinde yenilenir.</p>
    </aside>
  </main>
  <template id="app-template"><article class="app-editor"><div class="grab">⋮⋮</div><div class="fields"><label>İkon<select data-key="icon"><option value="☎">☎ Telefon</option><option value="▶">▶ Video</option><option value="ABC">ABC Eğitim</option><option value="✎">✎ Çizim</option><option value="♪">♪ Ses</option><option value="◎">◎ İnternet</option><option value="=">= Hesap</option><option value=">_">&gt;_ Terminal</option><option value="✦">✦ Oyun</option><option value="◆">◆ Uygulama</option></select></label><label>Ad<input data-key="title"></label><label>Alt yazı<input data-key="subtitle"></label><label>Renk<input data-key="color" type="color"></label><label>Açılacak uygulama<input data-key="action" readonly></label></div><div class="actions"><button data-move="-1" title="Yukarı taşı">↑</button><button data-move="1" title="Aşağı taşı">↓</button><button data-remove>Sil</button></div></article></template>
  <script src="app.js"></script>
</body>
</html>
